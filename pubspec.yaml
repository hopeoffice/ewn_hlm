name: ewn_hlm
description: "እውን ህልም — Flutter native version (migrated from PWA)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Backend (Step 1 — unchanged from the web app) ---
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4      # products (live catalog, onSnapshot equivalent)
  firebase_database: ^11.1.4   # users / cart / likes / orders / coins (Realtime DB)
  firebase_messaging: ^15.1.3  # push notifications (Step 3)

  # --- Local storage (Step 4) ---
  hive: ^2.2.3                 # cart / likes / orders / product offline cache
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2  # login session (phone+name) — persists until logout

  # --- Native APIs (Step 3) ---
  geolocator: ^13.0.1
  image_picker: ^1.1.2         # receipt photo for checkout (Telegram upload)
  share_plus: ^10.1.2          # native share sheet for referral links

  # --- State management ---
  provider: ^6.1.2

  # --- Networking (Cloudinary upload, Cloudflare Worker calls) ---
  http: ^1.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/faq_data.json
  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf

