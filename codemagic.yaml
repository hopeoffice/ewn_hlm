workflows:
  android-workflow:
    name: Ewn Hlm Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
    scripts:
      - name: Scaffold android/ platform folder if it isn't there yet
        script: |
          if [ ! -d "android" ] || [ ! -f "android/settings.gradle" ]; then
            echo "No android/ scaffold found — generating it now..."
            flutter create --platforms=android --org com.example .
          else
            echo "android/ already exists — skipping."
          fi
      - name: Wire the Firebase Google Services Gradle plugin
        script: bash scripts/wire_google_services.sh
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build release APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - flutter_drive.log
